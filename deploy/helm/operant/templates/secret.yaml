{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "operant.secretName" . }}
  labels:
    {{- include "operant.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPERANT_SECRET_KEY: {{ required "secrets.operantSecretKey is required when secrets.create=true" .Values.secrets.operantSecretKey | quote }}
  OPERANT_INTERNAL_TOKEN: {{ required "secrets.operantInternalToken is required when secrets.create=true" .Values.secrets.operantInternalToken | quote }}
  OPERANT_ADMIN_LOGIN_TOKEN: {{ required "secrets.operantAdminLoginToken is required when secrets.create=true" .Values.secrets.operantAdminLoginToken | quote }}
  OPENCLAW_GATEWAY_TOKEN: {{ required "secrets.openclawGatewayToken is required when secrets.create=true" .Values.secrets.openclawGatewayToken | quote }}
  {{- if not .Values.database.existingSecret.name }}
  DATABASE_URL: {{ required "database.url is required when secrets.create=true and database.existingSecret.name is empty" .Values.database.url | quote }}
  {{- else if .Values.database.url }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  {{- end }}
  {{- if .Values.redis.url }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- end }}
{{- end }}
