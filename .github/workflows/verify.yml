name: verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify:scripts

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm verify:compose

      - run: pnpm verify:deploy
