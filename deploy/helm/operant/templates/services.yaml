apiVersion: v1
kind: Service
metadata:
  name: {{ include "operant.fullname" . }}-headless
  labels:
    {{- include "operant.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "operant.selectorLabels" . | nindent 4 }}
  ports:
    - name: control-plane
      port: {{ .Values.controlPlane.port }}
      targetPort: control-plane
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "operant.fullname" . }}-control-plane
  labels:
    {{- include "operant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "operant.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.controlPlane.publicPort }}
      targetPort: control-plane
{{- if .Values.openclaw.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "operant.fullname" . }}-openclaw
  labels:
    {{- include "operant.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "operant.selectorLabels" . | nindent 4 }}
  ports:
    - name: gateway
      port: {{ .Values.openclaw.service.publicPort }}
      targetPort: openclaw
{{- end }}
