name: release

# Publishes the official Operant container images to GHCR on every version tag.
# Triggered by `git push --follow-tags` from the documented release flow
# (see CONTRIBUTING.md). Also runnable manually for a dry build of any ref.
#
# arm64 is built on a native arm64 runner (not QEMU) — emulated builds SIGILL
# while compiling OpenClaw's native deps. control-plane ships multi-arch via a
# per-arch digest build + manifest merge; the gateway is amd64-only (its base
# image only publishes amd64).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  # OpenClaw runtime pinned to match docker-compose.yml's default.
  OPENCLAW_VERSION: "2026.5.18"

jobs:
  gateway:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/operant/openclaw-gateway
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/openclaw/Dockerfile.gateway
          platforms: linux/amd64
          build-args: |
            OPENCLAW_VERSION=${{ env.OPENCLAW_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=gateway
          cache-to: type=gha,mode=max,scope=gateway

  control-plane-build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/control-plane/Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            OPENCLAW_VERSION=${{ env.OPENCLAW_VERSION }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/operant/control-plane,push-by-digest=true,name-canonical=true,push=true
          provenance: false
          cache-from: type=gha,scope=control-plane-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=control-plane-${{ matrix.platform }}
      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - uses: actions/upload-artifact@v4
        with:
          name: cp-digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  control-plane-merge:
    needs: control-plane-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: cp-digest-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/operant/control-plane
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
            type=sha,enable=${{ github.ref_type != 'tag' }}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          # shellcheck disable=SC2046  # word-splitting of the tag/digest lists is intended
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository_owner }}/operant/control-plane@sha256:%s ' *)
      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ github.repository_owner }}/operant/control-plane:${{ steps.meta.outputs.version }}
